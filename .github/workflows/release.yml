# Release workflow for openbrain (WD-012, OB-040).
#
# TRIGGER MODEL: deliberate dispatch only.
#   Releases are cut by running this workflow manually:
#
#     Real release:  gh workflow run release.yml --repo windingriverholdings/openbrain -f dry_run=false
#     Smoke check:   gh workflow run release.yml --repo windingriverholdings/openbrain -f dry_run=true
#     Bare/UI dispatch (default): dry run, harmless.
#
#   dry_run defaults to true. A bare Actions-UI dispatch or any invocation
#   without -f dry_run=false is a harmless smoke check. An explicit
#   -f dry_run=false is required to cut a real release. This prevents
#   accidental UI dispatches from creating tags or GitHub releases.
#
#   There is NO push-to-main auto-trigger. Merging a PR to main does NOT
#   cut a release. Craig decides when to release; Kit dispatches the workflow.
#
# NO PUSH TO refs/heads/main (releasing.md sections 3, 4, 5):
#   The main branch is protected (ruleset 16819112: changes must go through a
#   pull request). semantic-release therefore does NOT rewrite a source version
#   constant and does NOT push a bump commit to main. Its only outputs are the
#   git tag (refs/tags/*, not protected) and the GitHub release, both created
#   by @semantic-release/github. See .releaserc.js for the trimmed plugin chain.
#
#   The version is stamped into the binary at build time via ldflags from git
#   describe (see the Makefile). An un-injected build reports the "dev"
#   sentinel. The canary smoke-test below verifies the ldflags symbol path is
#   wired correctly before a tag is ever created: a typo in the -X path would
#   silently yield "dev" in production while every unit test stays green.
#
# RUNNER POLICY (devops.md, OB-039):
#   runs-on: ubuntu-latest. openbrain is a PUBLIC repo and the org's only
#   self-hosted runner group denies public repos (allows_public_repositories:
#   false), so this workflow could never be dispatched on self-hosted: it
#   queued forever. This job is NOT deploy-bearing (deploy_target: none, no
#   SSH, no DockerHub push): it only creates a tag and a GitHub release via
#   GITHUB_TOKEN, so the devops.md public-repo/non-deploy-bearing carve-out
#   applies, matching test.yml's runner choice.
#
# CONCURRENCY:
#   cancel-in-progress: false: if an operator accidentally dispatches twice,
#   the second run queues rather than cancelling the first mid-flight. A
#   cancelled mid-flight release is harder to recover from than a queued one.
#
# GATES (releasing.md section 7):
#   The gates in project.yml release.gates (unit-tests, reviews-complete,
#   cve-gate) are REQUIRED status checks in the openbrain main branch ruleset.
#   Kit verifies the gate checks are green before dispatching this workflow.
#   The workflow itself does not replicate gate logic in `needs:`.

name: Release

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run semantic-release in dry-run mode (no tag, no release)"
        type: boolean
        default: true

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  # false: queue a second manual dispatch rather than cancel a run mid-flight.
  cancel-in-progress: false

permissions:
  contents: write       # required: @semantic-release/github creates the tag and release
  issues: write         # required: @semantic-release/github creates/closes release issues
  pull-requests: write  # required: @semantic-release/github comments on PRs

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v6
        with:
          # fetch-depth: 0 is required. semantic-release reads the full tag
          # history to compute the next version. A shallow clone produces an
          # incorrect or missing bump. git describe (for the canary and the
          # deploy build) also needs the tag history.
          fetch-depth: 0
          # persist-credentials: false: the release makes NO git push. The
          # github plugin creates the tag and release through the GitHub API
          # via GITHUB_TOKEN, not a git push, so ambient push credentials are
          # neither needed nor wanted here.
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          # Node >= 22 required by the shared config's engines field.
          node-version: '22'

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Install semantic-release and shared config
        # npm ci installs from package-lock.json (locked transitive graph).
        # The shared config is installed from GitHub at the pinned #v0.2.0 tag.
        run: npm ci

      - name: Assert forge token is set (pre-flight)
        # A missing or empty GITHUB_TOKEN causes the github plugin to fail AFTER
        # semantic-release has computed and logged the release, making diagnosis
        # harder. This check aborts before any plugin step runs.
        run: |
          if [ -z "$GITHUB_TOKEN" ]; then
            echo "ERROR: GITHUB_TOKEN is empty. Aborting before release step runs." >&2
            exit 1
          fi
          echo "OK: GITHUB_TOKEN is set."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (pre-flight sanity)
        # Confirm the Go module compiles cleanly before the canary and release.
        # A broken build before the release step prevents a tag from being
        # created for code that does not compile.
        run: go build ./...

      - name: Canary version smoke-test (releasing.md section 4)
        # Gate the tag on proof that the ldflags -X symbol path is wired
        # correctly. Build the CLI with a synthetic, non-semver sentinel
        # injected via the SAME ldflags path the Makefile uses, boot it with
        # zero dependencies (the `version` subcommand runs before any config or
        # DB load), and assert it reports EXACTLY the sentinel. A "dev" result
        # or any mismatch means the -X path is wrong: hard-fail before a tag
        # exists. Unit tests cannot catch this: they never receive the stamp.
        run: |
          SENTINEL="v0.0.0-ldflags-smoke-test"
          SYMBOL="github.com/windingriverholdings/openbrain/internal/version.Version"
          CANARY_BIN="$(mktemp -d)/openbrain-canary"
          go build -ldflags "-X ${SYMBOL}=${SENTINEL}" -o "${CANARY_BIN}" ./cmd/openbrain
          REPORTED="$("${CANARY_BIN}" version)"
          rm -f "${CANARY_BIN}"
          if [ "${REPORTED}" != "${SENTINEL}" ]; then
            echo "ERROR: canary reported version '${REPORTED}', expected '${SENTINEL}'." >&2
            echo "The ldflags -X symbol path '${SYMBOL}' is wrong or the accessor changed." >&2
            echo "A tagged production build would silently report 'dev'. Aborting before tag." >&2
            exit 1
          fi
          echo "OK: canary reported '${REPORTED}'. The ldflags symbol path is wired correctly."

      # id: release is REQUIRED. The post-release assert and the no-release
      # signal step both reference steps.release.outputs. Without id: release
      # those expressions resolve to empty strings and neither step fires.
      #
      # DRY_RUN is set via env (not inline shell interpolation) so the boolean
      # input never touches the shell command string directly.
      - name: Release
        id: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          if [ "${DRY_RUN}" = "true" ]; then
            npx semantic-release --dry-run
          else
            npx semantic-release
          fi

      - name: No release produced (informational)
        if: steps.release.outputs.new_release_published != 'true'
        run: |
          echo "No release produced. This is normal when no feat/fix/perf commits"
          echo "exist since the last tag. If a release was expected, inspect the"
          echo "commit log: non-conventional messages are not counted as releasable."

      - name: Assert release tag exists on remote (post-release)
        # Fires only when a real release was published (not in dry-run mode).
        # Confirms the tag was created on the remote by the github plugin.
        # TAG_VERSION is set via env to avoid shell-interpolation surprises
        # on unexpected output shapes.
        if: steps.release.outputs.new_release_published == 'true'
        env:
          TAG_VERSION: ${{ steps.release.outputs.new_release_version }}
        run: |
          TAG="v${TAG_VERSION}"
          if ! git ls-remote --tags origin "refs/tags/${TAG}" | grep -q "${TAG}"; then
            echo "ERROR: expected tag '${TAG}' not found on remote after release." >&2
            echo "The @semantic-release/github plugin may have failed to create the tag." >&2
            exit 1
          fi
          echo "OK: release tag '${TAG}' confirmed on remote."
