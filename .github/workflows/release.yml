# Release workflow for openbrain (WD-012).
#
# TRIGGER MODEL: deliberate dispatch only.
#   Releases are cut by running this workflow manually:
#
#     Real release:  gh workflow run release.yml --repo windingriverholdings/openbrain -f dry_run=false
#     Smoke check:   gh workflow run release.yml --repo windingriverholdings/openbrain -f dry_run=true
#     Bare/UI dispatch (default): dry run, harmless.
#
#   dry_run defaults to true. A bare Actions-UI dispatch or any invocation
#   without -f dry_run=false is a harmless smoke check. An explicit
#   -f dry_run=false is required to cut a real release. This prevents
#   accidental UI dispatches from creating tags or GitHub releases.
#
#   There is NO push-to-main auto-trigger. Merging a PR to main does NOT
#   cut a release. Craig decides when to release; Kit dispatches the workflow.
#
# RUNNER POLICY (devops.md):
#   runs-on: self-hosted. openbrain is a private repo and the standard
#   devops.md rule requires self-hosted for deploy-bearing CI. This workflow
#   creates tags and GitHub releases. The ubuntu-latest public-repo carve-out
#   in test.yml does NOT apply here: test.yml is read-only CI on a public repo;
#   release.yml is write CI (tag creation, forge release). Use self-hosted.
#
# CONCURRENCY:
#   cancel-in-progress: false: if an operator accidentally dispatches twice,
#   the second run queues rather than cancelling the first mid-flight. A
#   cancelled mid-flight release is harder to recover from than a queued one.
#
# GATES (WRS release standard, Section 6):
#   The gates in project.yml release.gates (unit-tests, reviews-complete,
#   cve-gate) are REQUIRED status checks in the openbrain main branch ruleset.
#   Kit verifies the gate checks are green before dispatching this workflow.
#   The workflow itself does not replicate gate logic in `needs:`.
#
# FOUR MANDATORY OUTPUTS (WRS release standard, Section 1):
#   1. Semantic version computed from conventional commits since the last tag.
#   2. Changelog entry written to CHANGELOG.md.
#   3. var Version in internal/version/version.go rewritten to the new semver
#      and committed to main via @semantic-release/exec + @semantic-release/git.
#   4. Tagged GitHub release created by @semantic-release/github.
#
# POST-RELEASE ASSERT:
#   Confirms the expected release tag exists on the remote. Fires only when
#   new_release_published == true (real release, not dry-run). A missing tag
#   after a published release indicates the github plugin failed to push;
#   the step exits non-zero so the job fails loudly.

name: Release

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run semantic-release in dry-run mode (no tag, no release)"
        type: boolean
        default: true

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  # false: queue a second manual dispatch rather than cancel a run mid-flight.
  cancel-in-progress: false

permissions:
  contents: write       # required: semantic-release creates the release tag
  issues: write         # required: @semantic-release/github creates/closes release issues
  pull-requests: write  # required: @semantic-release/github comments on PRs

jobs:
  release:
    name: Release
    runs-on: self-hosted

    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v6
        with:
          # fetch-depth: 0 is required. semantic-release reads the full tag
          # history to compute the next version. A shallow clone produces an
          # incorrect or missing bump.
          fetch-depth: 0
          # persist-credentials: true so semantic-release can push the bump
          # commit (var Version rewrite + CHANGELOG.md) and the release tag.
          persist-credentials: true

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          # Node >= 22 required by the shared config's engines field.
          node-version: '22'

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Install semantic-release and shared config
        # npm ci installs from package-lock.json (locked transitive graph).
        # The shared config is installed from GitHub at the pinned #v0.2.0 tag.
        run: npm ci

      - name: Assert forge token is set (pre-flight)
        # A missing or empty GITHUB_TOKEN causes the github plugin to fail AFTER
        # semantic-release has computed and logged the release, making diagnosis
        # harder. This check aborts before any plugin step runs.
        run: |
          if [ -z "$GITHUB_TOKEN" ]; then
            echo "ERROR: GITHUB_TOKEN is empty. Aborting before release step runs." >&2
            exit 1
          fi
          echo "OK: GITHUB_TOKEN is set."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Assert var Version line exists in version file (pre-flight)
        # Verify the grep-count guard will pass before semantic-release runs.
        # If the var has been moved or renamed, this step fails loudly here
        # rather than mid-release after the changelog has already been written.
        run: |
          VERSION_FILE="internal/version/version.go"
          PATTERN='var Version = '
          count=$(grep -c "${PATTERN}" "${VERSION_FILE}" || true)
          if [ "${count}" -ne 1 ]; then
            echo "ERROR: expected exactly 1 line matching '${PATTERN}' in ${VERSION_FILE}, found ${count}." >&2
            echo "Update VERSION_FILE or VERSION_PATTERN in .releaserc.js to match the actual location." >&2
            exit 1
          fi
          echo "OK: var Version line found exactly once in ${VERSION_FILE}."

      - name: Build (pre-flight sanity)
        # Confirm the Go module compiles cleanly before running semantic-release.
        # A broken build before the release step prevents a tag from being
        # created for code that does not compile.
        run: go build ./...

      # id: release is REQUIRED. The post-release assert and the no-release
      # signal step both reference steps.release.outputs. Without id: release
      # those expressions resolve to empty strings and neither step fires correctly.
      #
      # DRY_RUN is set via env (not inline shell interpolation) so the boolean
      # input never touches the shell command string directly.
      - name: Release
        id: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          if [ "${DRY_RUN}" = "true" ]; then
            npx semantic-release --dry-run
          else
            npx semantic-release
          fi

      - name: No release produced (informational)
        if: steps.release.outputs.new_release_published != 'true'
        run: |
          echo "No release produced. This is normal when no feat/fix/perf commits"
          echo "exist since the last tag. If a release was expected, inspect the"
          echo "commit log: non-conventional messages are not counted as releasable."

      - name: Assert release tag exists on remote (post-release)
        # Fires only when a real release was published (not in dry-run mode).
        # Confirms the tag was pushed to the remote by the github plugin.
        # TAG_VERSION is set via env to avoid shell-interpolation surprises
        # on unexpected output shapes.
        if: steps.release.outputs.new_release_published == 'true'
        env:
          TAG_VERSION: ${{ steps.release.outputs.new_release_version }}
        run: |
          TAG="v${TAG_VERSION}"
          if ! git ls-remote --tags origin "refs/tags/${TAG}" | grep -q "${TAG}"; then
            echo "ERROR: expected tag '${TAG}' not found on remote after release." >&2
            echo "The @semantic-release/github plugin may have failed to push the tag." >&2
            exit 1
          fi
          echo "OK: release tag '${TAG}' confirmed on remote."

      - name: Assert var Version was rewritten (post-release)
        # Fires only on a real release. Reads internal/version/version.go from
        # the LOCAL working tree, which @semantic-release/exec already rewrote
        # and @semantic-release/git already committed during the Release step.
        # No network fetch needed: the file on disk is the authoritative state.
        # A "dev" value here means the exec prepareCmd failed silently or the
        # git plugin did not stage the file before committing.
        if: steps.release.outputs.new_release_published == 'true'
        env:
          TAG_VERSION: ${{ steps.release.outputs.new_release_version }}
        run: |
          VERSION_FILE="internal/version/version.go"
          WRITTEN=$(grep 'var Version = ' "${VERSION_FILE}" | sed 's/.*var Version = "\(.*\)".*/\1/')
          if [ "${WRITTEN}" = "dev" ] || [ -z "${WRITTEN}" ]; then
            echo "ERROR: ${VERSION_FILE} still contains Version='${WRITTEN}' after release." >&2
            echo "The @semantic-release/exec prepareCmd may have failed silently." >&2
            exit 1
          fi
          if [ "${WRITTEN}" != "${TAG_VERSION}" ]; then
            echo "ERROR: ${VERSION_FILE} contains Version='${WRITTEN}', want '${TAG_VERSION}'." >&2
            exit 1
          fi
          echo "OK: var Version='${WRITTEN}' matches release tag v${TAG_VERSION}."
